name: Weekly Digest
on:
  schedule:
    - cron: '0 9 * * 1'
jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Generate weekly engineering digest for Nucleus: test trends, coverage, performance, security updates, action items."
