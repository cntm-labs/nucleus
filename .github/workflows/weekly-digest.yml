name: Weekly Digest
on:
  schedule:
    - cron: '0 9 * * 1'
jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "Generate weekly engineering digest for Nucleus: test trends, coverage, performance, security updates, action items."
