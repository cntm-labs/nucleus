          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run auth flow load test
        continue-on-error: true
        run: |
          k6 run load-tests/auth-flow.k6.js \
            --env BASE_URL=http://localhost:3000 \
            --env K6_PROFILE=${{ inputs.profile || 'full' }} \
            --summary-export=auth-results.json \
            2>&1 | tee auth-output.txt

      - name: Post auth load test summary
        if: always()
        run: |
          echo "## 🔐 Auth Flow Load Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Profile:** ${{ inputs.profile || 'full' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f auth-results.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat auth-results.json | python3 -m json.tool >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f auth-output.txt ]; then tail -40 auth-output.txt >> $GITHUB_STEP_SUMMARY; else echo "No output captured" >> $GITHUB_STEP_SUMMARY; fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-auth-results
          path: auth-*.json
          retention-days: 30

