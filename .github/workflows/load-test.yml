name: Load Test

on:
  push:
    branches: [main]
    paths: ['crates/**']
  workflow_dispatch:
    inputs:
      profile:
        description: 'Test profile'
        required: false
        default: 'full'
        type: choice
        options: [ci, full]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { shared-key: load-test }
      - run: cargo build --release --bin nucleus-server
      - uses: actions/upload-artifact@v4
        with:
          name: nucleus-server
          path: target/release/nucleus-server
          retention-days: 1

  smoke:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: nucleus, POSTGRES_USER: nucleus, POSTGRES_PASSWORD: nucleus }
        ports: [5432:5432]
        options: --health-cmd "pg_isready -U nucleus" --health-interval 3s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 3s --health-retries 5
    env:
      DATABASE_URL: postgres://nucleus:nucleus@localhost:5432/nucleus
      REDIS_URL: redis://localhost:6379
      MASTER_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: nucleus-server }
      - run: chmod +x nucleus-server && ./nucleus-server &
      - run: sleep 3 && curl -sf http://localhost:3000/health

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run smoke test
        id: k6_smoke
        continue-on-error: true
        run: |
          k6 run load-tests/smoke.k6.js \
            --env BASE_URL=http://localhost:3000 \
            --summary-export=smoke-results.json \
            2>&1 | tee smoke-output.txt

      - name: Post smoke summary
        if: always()
        run: |
          echo "## 🔥 k6 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f smoke-results.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            python3 -m json.tool smoke-results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No results file — k6 may have failed to start" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f smoke-output.txt ]; then
            echo "### Raw Output (last 30 lines)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 smoke-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if smoke test failed
        if: steps.k6_smoke.outcome == 'failure'
        run: exit 1

  load-auth:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
