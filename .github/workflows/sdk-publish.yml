name: Publish SDKs
# Publishes SDK packages to their respective registries

on:
  workflow_dispatch:
    inputs:
      sdk:
        description: 'Which SDK to publish'
        required: true
        type: choice
        options:
          - all
          - npm
          - python
          - rust
          - rust-server
          - flutter
          - nuget
          - maven
          - android
          - swift
          - go
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true
        default: '0.1.0'
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        type: boolean
        default: true
  workflow_call:
    inputs:
      sdk:
        required: true
        type: string
      version:
        required: true
        type: string
      dry_run:
        required: false
        type: boolean
        default: false

jobs:
  # --- npm (4 packages) ---
  npm:
    if: inputs.sdk == 'all' || inputs.sdk == 'npm'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [js, node, react, nextjs]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if already published
        id: check
        env:
          SDK_VERSION: ${{ inputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          EXISTING=$(npm view "@cntm-labs/nucleus-${{ matrix.package }}" version 2>/dev/null || echo "")
          if [ "$EXISTING" = "$SDK_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $SDK_VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Update version
        if: steps.check.outputs.skip != 'true'
        env:
          SDK_VERSION: ${{ inputs.version }}
        run: cd sdks/${{ matrix.package }} && npm version "$SDK_VERSION" --no-git-tag-version --allow-same-version
      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: cd sdks/${{ matrix.package }} && npm install && npm run build --if-present
      - name: Publish
        if: inputs.dry_run == false && steps.check.outputs.skip != 'true'
        run: cd sdks/${{ matrix.package }} && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Dry run
        if: inputs.dry_run == true && steps.check.outputs.skip != 'true'
        run: cd sdks/${{ matrix.package }} && npm publish --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # --- Python ---
  python:
    if: inputs.sdk == 'all' || inputs.sdk == 'python'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build twine
      - name: Set version
        env:
          SDK_VERSION: ${{ inputs.version }}
        run: |
          cd sdks/python
          sed -i "s/^version = .*/version = \"$SDK_VERSION\"/" pyproject.toml
          echo "Updated version to $SDK_VERSION"
          grep '^version' pyproject.toml
      - name: Build
        run: cd sdks/python && python -m build
      - name: Publish
        if: inputs.dry_run == false
        run: cd sdks/python && twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      - name: Dry run
        if: inputs.dry_run == true
        run: cd sdks/python && twine check dist/*

  # --- Rust SDK ---
  rust:
    if: inputs.sdk == 'all' || inputs.sdk == 'rust'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        if: inputs.dry_run == false
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cd sdks/rust && cargo publish --token "$CRATES_TOKEN"
      - name: Dry run
        if: inputs.dry_run == true
        run: cd sdks/rust && cargo publish --dry-run

  # --- Rust Server ---
  # NOTE: Requires all internal crates (nucleus-core, nucleus-db, etc.)
  # to be published to crates.io first. Skip in 'all' mode.
  rust-server:
    if: inputs.sdk == 'rust-server'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        if: inputs.dry_run == false
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cd crates/nucleus-server && cargo publish --token "$CRATES_TOKEN"
      - name: Dry run
        if: inputs.dry_run == true
        run: cd crates/nucleus-server && cargo publish --dry-run

  # --- Flutter ---
  flutter:
    if: inputs.sdk == 'all' || inputs.sdk == 'flutter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - name: Setup pub credentials
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_DEV_CREDENTIALS }}
        run: |
          mkdir -p "$HOME/.config/dart"
          echo "$PUB_CREDENTIALS" > "$HOME/.config/dart/pub-credentials.json"
      - name: Publish
        if: inputs.dry_run == false
        run: cd sdks/flutter && dart pub publish --force
      - name: Dry run
        if: inputs.dry_run == true
        run: cd sdks/flutter && dart pub publish --dry-run

  # --- NuGet (.NET) ---
  nuget:
    if: inputs.sdk == 'all' || inputs.sdk == 'nuget'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - name: Set version
        env:
          SDK_VERSION: ${{ inputs.version }}
        run: |
          for csproj in sdks/dotnet/src/Nucleus/Nucleus.csproj sdks/dotnet/src/Nucleus.AspNetCore/Nucleus.AspNetCore.csproj; do
            sed -i "s|<Version>.*</Version>|<Version>$SDK_VERSION</Version>|" "$csproj"
            echo "Updated $csproj to $SDK_VERSION"
          done
      - name: Pack
        run: |
          dotnet pack sdks/dotnet/src/Nucleus/Nucleus.csproj -c Release -o nupkgs
          dotnet pack sdks/dotnet/src/Nucleus.AspNetCore/Nucleus.AspNetCore.csproj -c Release -o nupkgs
      - name: Publish
        if: inputs.dry_run == false
        env:
          NUGET_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key "$NUGET_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Dry run
        if: inputs.dry_run == true
        run: ls -la nupkgs/

  # --- Maven Central (Java) ---
  maven:
    if: inputs.sdk == 'all' || inputs.sdk == 'maven'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Import GPG key
        env:
          GPG_KEY: ${{ secrets.MAVEN_GPG_KEY }}
        run: echo "$GPG_KEY" | base64 -d | gpg --batch --import
      - name: Set version
        env:
          SDK_VERSION: ${{ inputs.version }}
        run: cd sdks/java && mvn versions:set -DnewVersion="$SDK_VERSION" -DgenerateBackupPoms=false
      - name: Deploy Java SDK
        if: inputs.dry_run == false
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          cd sdks/java && mvn deploy \
            -Dgpg.passphrase="$GPG_PASSPHRASE" \
            -DskipTests
      - name: Dry run
        if: inputs.dry_run == true
        run: cd sdks/java && mvn package -DskipTests

  # --- Android SDKs (Gradle → Maven Central) ---
  android:
    if: inputs.sdk == 'all' || inputs.sdk == 'android'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: sdks/android
            name: nucleus-android
          - path: sdks/android-java
            name: nucleus-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Import GPG key
        env:
          GPG_KEY: ${{ secrets.MAVEN_GPG_KEY }}
        run: echo "$GPG_KEY" | base64 -d | gpg --batch --import
      - name: Set version
        env:
          SDK_VERSION: ${{ inputs.version }}
        run: |
          cd ${{ matrix.path }}
          if [ -f build.gradle.kts ]; then
            sed -i "s/version = .*/version = \"$SDK_VERSION\"/" build.gradle.kts
          elif [ -f build.gradle ]; then
            sed -i "s/version = .*/version = '$SDK_VERSION'/" build.gradle
          fi
      - name: Publish
        if: inputs.dry_run == false
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_ossrhUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_ossrhPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.MAVEN_GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: cd ${{ matrix.path }} && ./gradlew publishReleasePublicationToMavenCentralRepository --info
      - name: Dry run
        if: inputs.dry_run == true
        run: cd ${{ matrix.path }} && ./gradlew assembleRelease

  # --- Swift (CocoaPods) ---
  swift:
    if: inputs.sdk == 'all' || inputs.sdk == 'swift'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate podspec
        run: cd sdks/swift && pod lib lint CntmNucleus.podspec --allow-warnings --platforms=ios
      - name: Publish
        if: inputs.dry_run == false
        run: cd sdks/swift && pod trunk push CntmNucleus.podspec --allow-warnings
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
      - name: Dry run
        if: inputs.dry_run == true
        run: echo "Dry run — podspec validated"

  # --- Go ---
  go:
    if: inputs.sdk == 'all' || inputs.sdk == 'go'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Verify module
        run: cd sdks/go && go vet ./...
      - name: Create Go module tag and trigger indexing
        if: inputs.dry_run == false
        env:
          SDK_VERSION: ${{ inputs.version }}
        run: |
          GO_TAG="sdks/go/v${SDK_VERSION}"
          echo "Go module tag must be: ${GO_TAG}"
          if git tag -l | grep -qx "${GO_TAG}"; then
            echo "Tag ${GO_TAG} already exists"
          else
            echo "Creating tag ${GO_TAG}..."
            git tag "${GO_TAG}"
            git push origin "${GO_TAG}"
          fi
          echo "Triggering pkg.go.dev fetch..."
          sleep 10
          curl -sf "https://proxy.golang.org/github.com/cntm-labs/nucleus/sdks/go/@v/v${SDK_VERSION}.info" \
            || echo "WARN: pkg.go.dev may take a few minutes to index"
      - name: Dry run
        if: inputs.dry_run == true
        env:
          SDK_VERSION: ${{ inputs.version }}
        run: echo "Would verify tag cntm-nucleus-go-v${SDK_VERSION}"

  # --- Verify all published packages ---
  verify:
    if: always() && inputs.dry_run == false
    needs: [npm, python, rust, flutter, nuget, maven, android, swift, go]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for registry propagation
        run: sleep 60
      - name: Verify npm packages
        if: always() && (inputs.sdk == 'all' || inputs.sdk == 'npm')
        run: |
          FAIL=0
          for pkg in js node react nextjs; do
            echo -n "Checking @cntm-labs/nucleus-$pkg... "
            if npm view "@cntm-labs/nucleus-$pkg" version 2>/dev/null; then
              echo "OK"
            else
              echo "FAIL: not found on registry"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] || exit 1
      - name: Verify PyPI package
        if: always() && (inputs.sdk == 'all' || inputs.sdk == 'python')
        run: |
          pip index versions cntm-nucleus 2>/dev/null || { echo "FAIL: not on PyPI"; exit 1; }
      - name: Verify crates.io packages
        if: always() && (inputs.sdk == 'all' || inputs.sdk == 'rust')
        run: |
          curl -sf "https://crates.io/api/v1/crates/cntm-nucleus" \
            | python3 -c "import sys,json; print('OK:', json.load(sys.stdin)['crate']['newest_version'])" \
            || { echo "FAIL: cntm-nucleus not on crates.io"; exit 1; }
      - name: Verify NuGet package
        if: always() && (inputs.sdk == 'all' || inputs.sdk == 'nuget')
        run: |
          curl -sf "https://api.nuget.org/v3-flatcontainer/cntm.nucleus/index.json" \
            | python3 -c "import sys,json; v=json.load(sys.stdin)['versions']; print('OK:', v[-1])" \
            || { echo "FAIL: NuGet package not found"; exit 1; }
      - name: Verify Maven package
        if: always() && (inputs.sdk == 'all' || inputs.sdk == 'maven')
        run: |
          curl -sf "https://search.maven.org/solrsearch/select?q=g:io.github.cntm-labs+AND+a:nucleus&rows=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK:', d['response']['docs'][0]['latestVersion'] if d['response']['numFound']>0 else 'NOT FOUND')" \
            || { echo "FAIL: Maven package not found"; exit 1; }
      - name: Verify CocoaPods
        if: always() && (inputs.sdk == 'all' || inputs.sdk == 'swift')
        run: |
          curl -sf "https://trunk.cocoapods.org/api/v1/pods/CntmNucleus" \
            | python3 -c "import sys,json; v=json.load(sys.stdin)['versions']; print('OK:', v[0]['name'])" \
            || { echo "FAIL: CocoaPods not found"; exit 1; }
      - name: Verify Go module
        if: always() && (inputs.sdk == 'all' || inputs.sdk == 'go')
        run: |
          curl -sf "https://proxy.golang.org/github.com/cntm-labs/nucleus/sdks/go/@v/list" \
            || { echo "FAIL: Go module not indexed"; exit 1; }
      - name: Summary
        if: always()
        run: echo "Verification complete. Check steps above — any failed step means the package is NOT on the registry."
