[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    "RUSTSEC-2023-0071",  # rsa crate — pending migration to ring-only
    "RUSTSEC-2024-0421",  # idna — transitive dep, low risk
    "RUSTSEC-2024-0370",  # proc-macro-error — unmaintained, pulled via validator_derive, no alternative yet
    "RUSTSEC-2026-0097",  # rand 0.8.5 unsound — transitive via sqlx/rsa, Nucleus does not use custom logger with rand::rng()
]

[licenses]
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "MPL-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "BSL-1.0",
    "0BSD",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "simplest-path"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
